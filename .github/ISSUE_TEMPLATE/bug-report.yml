name: Bug report
description: Report unexpected behavior in the SDK, toolchain, or generated ROM
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Video
        - Audio
        - Input
        - Asset Pipeline
        - Core (memory map / registers)
        - Build / Tooling
        - Documentation
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - SDK version / commit:
        - OS:
        - Python version:
        - Toolchain (e.g. devkitARM, GCC version):
        - Emulator (e.g. mGBA, no$gba) and version:
        - Real hardware: yes/no
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant terminal output, build errors, or screenshots/video of the bug on emulator or hardware
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Low — cosmetic / minor inconvenience"
        - "Medium — affects functionality but has a workaround"
        - "High — breaks core functionality, no workaround"
        - "Critical — crashes / corrupts ROM / blocks build"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] Root cause identified
        - [ ] Fix verified on emulator (mGBA)
        - [ ] Regression test added (where applicable)